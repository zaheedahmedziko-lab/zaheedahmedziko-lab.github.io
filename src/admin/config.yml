backend:  name: git-gateway  branch: mainmedia_folder: "src/assets/uploads"public_folder: "/assets/uploads"site_url: "https://YOUR-NETLIFY-SITE-NAME.netlify.app"display_url: "https://YOUR-NETLIFY-SITE-NAME.netlify.app"collections:  - name: "pages"    label: "Website Pages"    files:      - label: "About Page"        name: "about"        file: "src/about.md"        fields:          - { label: "Layout", name: "layout", widget: "hidden", default: "page.njk" }          - { label: "Title", name: "title", widget: "string" }          - { label: "Eyebrow", name: "eyebrow", widget: "string" }          - { label: "Description", name: "description", widget: "text" }          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/about/" }          - { label: "Body", name: "body", widget: "markdown" }      - label: "Research Page"        name: "research"        file: "src/research.md"        fields:          - { label: "Layout", name: "layout", widget: "hidden", default: "page.njk" }          - { label: "Title", name: "title", widget: "string" }          - { label: "Eyebrow", name: "eyebrow", widget: "string" }          - { label: "Description", name: "description", widget: "text" }          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/research/" }          - { label: "Body", name: "body", widget: "markdown" }      - label: "Publications Page"        name: "publications"        file: "src/publications.md"        fields:          - { label: "Layout", name: "layout", widget: "hidden", default: "page.njk" }          - { label: "Title", name: "title", widget: "string" }          - { label: "Eyebrow", name: "eyebrow", widget: "string" }          - { label: "Description", name: "description", widget: "text" }          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/publications/" }          - { label: "Body", name: "body", widget: "markdown" }      - label: "Experience Page"        name: "experience"        file: "src/experience.md"        fields:          - { label: "Layout", name: "layout", widget: "hidden", default: "page.njk" }          - { label: "Title", name: "title", widget: "string" }          - { label: "Eyebrow", name: "eyebrow", widget: "string" }          - { label: "Description", name: "description", widget: "text" }          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/experience/" }          - { label: "Body", name: "body", widget: "markdown" }      - label: "Contact Page"        name: "contact"        file: "src/contact.md"        fields:          - { label: "Layout", name: "layout", widget: "hidden", default: "page.njk" }          - { label: "Title", name: "title", widget: "string" }          - { label: "Eyebrow", name: "eyebrow", widget: "string" }          - { label: "Description", name: "description", widget: "text" }          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/contact/" }          - { label: "Body", name: "body", widget: "markdown" }  - name: "blog"    label: "Blog Posts"    folder: "src/blog"    create: true    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"    fields:      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }      - { label: "Title", name: "title", widget: "string" }      - { label: "Summary", name: "summary", widget: "text" }      - { label: "Date", name: "date", widget: "datetime" }      - { label: "Permalink", name: "permalink", widget: "string", default: "/blog/post-title/" }      - { label: "Body", name: "body", widget: "markdown" }